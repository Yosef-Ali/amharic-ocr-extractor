<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Extract Amharic (ge'ez) text from PDFs and images with high accuracy using Google Gemini Pro Vision." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Inter font for UI -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Noto fonts for Amharic document results -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <title>Amharic OCR Extractor</title>
  <!-- Anti-flicker: apply saved theme before React renders -->
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('theme')||'light'}catch{}</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
